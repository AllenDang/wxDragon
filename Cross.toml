[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update",
    "apt-get install -y --no-install-recommends libgtk-3-dev:$CROSS_DEB_ARCH libglib2.0-dev:$CROSS_DEB_ARCH libpng-dev:$CROSS_DEB_ARCH libjpeg-dev:$CROSS_DEB_ARCH libgl1-mesa-dev:$CROSS_DEB_ARCH libglu1-mesa-dev:$CROSS_DEB_ARCH x11proto-dev:$CROSS_DEB_ARCH libx11-dev:$CROSS_DEB_ARCH libx11-xcb-dev:$CROSS_DEB_ARCH libxext-dev:$CROSS_DEB_ARCH libxrender-dev:$CROSS_DEB_ARCH libxrandr-dev:$CROSS_DEB_ARCH libxinerama-dev:$CROSS_DEB_ARCH libxcursor-dev:$CROSS_DEB_ARCH libxi-dev:$CROSS_DEB_ARCH libxcomposite-dev:$CROSS_DEB_ARCH libxdamage-dev:$CROSS_DEB_ARCH libxfixes-dev:$CROSS_DEB_ARCH libxcb1-dev:$CROSS_DEB_ARCH libxkbcommon-dev:$CROSS_DEB_ARCH libwayland-dev:$CROSS_DEB_ARCH libexpat1-dev:$CROSS_DEB_ARCH zlib1g-dev:$CROSS_DEB_ARCH libtiff-dev:$CROSS_DEB_ARCH libwebkit2gtk-4.0-dev:$CROSS_DEB_ARCH libxtst-dev:$CROSS_DEB_ARCH libssl-dev:$CROSS_DEB_ARCH pkg-config",
]

